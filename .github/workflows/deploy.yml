name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - test # TODO: Change to your environments
      image_tag:
        description: 'Image tag to deploy - will default to the latest commit SHA'
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APP_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.APP_SERVER_SSH_PORT }} -H ${{ secrets.APP_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Set compose files
        id: compose
        run: |
          COMPOSE_FILES="compose.prod.app.yaml"
          if [[ "${{ vars.DEPLOY_DATABASE_WITH_APP }}" == "true" ]]; then
            COMPOSE_FILES="$COMPOSE_FILES:compose.prod.db.yaml"
          fi
          echo "files=$COMPOSE_FILES" >> "$GITHUB_OUTPUT"

      - name: Deploy .env
        run: |
          printf '%s' "$APP_ENV" > .env.tmp
          printf '\nIMAGE_TAG=%s\n' "${{ inputs.image_tag || github.sha }}" >> .env.tmp
          printf 'COMPOSE_FILE=%s\n' "${{ steps.compose.outputs.files }}" >> .env.tmp
          scp -i ~/.ssh/deploy_key -P ${{ secrets.APP_SERVER_SSH_PORT }} \
            .env.tmp \
            docker@${{ secrets.APP_SERVER_IP }}:/home/docker/current/.env
          rm .env.tmp
        env:
          APP_ENV: ${{ secrets.APP_ENV }}

      - name: Copy compose files
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.APP_SERVER_SSH_PORT }} \
            docker/compose/_compose.base.app.yaml \
            docker/compose/compose.prod.app.yaml \
            docker@${{ secrets.APP_SERVER_IP }}:/home/docker/current/
          scp -i ~/.ssh/deploy_key -P ${{ secrets.APP_SERVER_SSH_PORT }} \
            docker/compose/traefik/traefik.prod.yaml \
            docker@${{ secrets.APP_SERVER_IP }}:/home/docker/current/traefik/


      - name: Copy database compose files
        if: vars.DEPLOY_DATABASE_WITH_APP == 'true'
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.APP_SERVER_SSH_PORT }} \
            docker/compose/_compose.base.db.yaml \
            docker/compose/compose.prod.db.yaml \
            docker@${{ secrets.APP_SERVER_IP }}:/home/docker/current/

      - name: Pre-deploy backup
        if: vars.BACKUP_ENABLED == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.APP_SERVER_SSH_PORT }} docker@${{ secrets.APP_SERVER_IP }} \
            "sudo -u ops /home/ops/scripts/pre-deploy-backup.sh"
          
      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.APP_SERVER_SSH_PORT }} docker@${{ secrets.APP_SERVER_IP }} \
            "cd /home/docker/current && \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ${{ vars.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin && \
             docker compose pull && \
             docker compose up -d --remove-orphans"
