name: CI

on:
  push:
    branches: # TODO: Replace with your project's branches
      - main 
  pull_request:

permissions:
  actions: read
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # TODO: Replace with your project's build / test / lint steps
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      #- uses: actions/checkout@v4
      #- uses: actions/setup-node@v4
      #  with:
      #    node-version: 25
      - run: echo "[TODO] replace my steps"
      #- run: npm ci
      #- run: npm run lint
      #- run: npm test
      #- run: npm run build

  # ---------------------------------------------------------------------------
  # Create releases from conventional commits
  # Opens/updates a Release PR on push to main; merging it creates a git tag
  # and GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

  # ---------------------------------------------------------------------------
  # Resolve deployment environment from branch name and generate image tag
  # TODO: This is just an example, replace with your own logic.
  # ---------------------------------------------------------------------------
  resolve-environment:
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push'
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve environment from branch
        id: resolve
        run: |
          if [[ "${{ needs.release.outputs.release_created }}" == "true" ]]; then
            echo "image_tag=${{ needs.release.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi
          case "${{ github.ref_name }}" in
            main)
              echo "environment=test" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ---------------------------------------------------------------------------
  # Build and push Docker images
  # TODO: Update the matrix to match your project's Docker images
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [test, resolve-environment, release]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - image: fronted
            dockerfile: ./docker/example-services/frontend/Dockerfile
            context: ./docker/example-services/frontend
          - image: backend
            dockerfile: ./docker/example-services/backend/Dockerfile
            context: ./docker/example-services/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=${{ needs.resolve-environment.outputs.image_tag }}
            type=raw,value=latest,enable=${{ needs.release.outputs.release_created == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to the resolved environment
  # ---------------------------------------------------------------------------
  deploy:
    needs: [docker, resolve-environment]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: ${{ needs.resolve-environment.outputs.environment }}
      image_tag: ${{ needs.resolve-environment.outputs.image_tag }}
