name: CI

on:
  push:
    branches: # TODO: Replace with your project's branches
      - main 
  pull_request:

permissions:
  actions: read
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # TODO: Replace with your project's build / test / lint steps
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      #- uses: actions/checkout@v4
      #- uses: actions/setup-node@v4
      #  with:
      #    node-version: 25
      - run: echo "[TODO] replace my steps"
      #- run: npm ci
      #- run: npm run lint
      #- run: npm test
      #- run: npm run build

  # ---------------------------------------------------------------------------
  # Create releases from conventional commits
  # Opens/updates a Release PR on push to main; merging it creates a git tag
  # and GitHub Release.
  #
  # See the release-please docs for more info:
  # https://github.com/googleapis/release-please?tab=readme-ov-file#how-should-i-write-my-commits
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

  # ---------------------------------------------------------------------------
  # Detect whether Docker source files changed
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'docker/example-services/**'

  # ---------------------------------------------------------------------------
  # Resolve deployment environment from branch name and generate image tag
  # TODO: This is just an example, replace with your own logic.
  # ---------------------------------------------------------------------------
  resolve-environment:
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push'
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve environment from branch
        id: resolve
        run: |
          echo "image_tag=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          case "${{ github.ref_name }}" in
            main)
              echo "environment=test" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ---------------------------------------------------------------------------
  # Build and push Docker images
  # TODO: Update the matrix to match your project's Docker images
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [test, resolve-environment, changes]
    if: github.event_name == 'push' && needs.changes.outputs.docker == 'true'
    strategy:
      matrix:
        include:
          - image: frontend
            dockerfile: ./docker/example-services/frontend/Dockerfile
            context: ./docker/example-services/frontend
          - image: backend
            dockerfile: ./docker/example-services/backend/Dockerfile
            context: ./docker/example-services/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=${{ needs.resolve-environment.outputs.image_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Retag existing images on release (no rebuild)
  # ---------------------------------------------------------------------------
  release-tag:
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - image: frontend
            context: ./docker/example-services/frontend
          - image: backend
            context: ./docker/example-services/backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag image with version
        run: |
          # Find the commit that last changed this image's Docker source files.
          LAST_SHA=$(git log -1 --format='%h' -- '${{ matrix.context }}')
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.image }}"
          TAG="${{ needs.release.outputs.tag_name }}"
          echo "Retagging ${IMAGE}:sha-${LAST_SHA} → ${TAG}, latest"
          docker buildx imagetools create \
            "${IMAGE}:sha-${LAST_SHA}" \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest"

  # ---------------------------------------------------------------------------
  # Deploy to the resolved environment
  # ---------------------------------------------------------------------------
  deploy:
    needs: [docker, release-tag, resolve-environment, changes, release]
    if: >-
      !failure() && !cancelled() &&
      github.event_name == 'push' && (
        needs.changes.outputs.docker == 'true' ||
        needs.release.outputs.release_created == 'true'
      )
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: ${{ needs.resolve-environment.outputs.environment }}
      image_tag: ${{ needs.release.outputs.release_created == 'true' && needs.release.outputs.tag_name || needs.resolve-environment.outputs.image_tag }}
