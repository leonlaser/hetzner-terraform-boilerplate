# Example Docker Compose setup demonstrating Traefik + a Node.js app.
#
# The .env file at /home/deploy/.env is provisioned by Terraform and contains
# both infrastructure vars (APP_DOMAIN, ACME_*, TRAEFIK_*) and any
# application vars you defined via app_env_vars.
#
# Each service selects only the variables it needs via the `environment` key.
# Variable interpolation in labels/command uses ${VAR} syntax, which Docker
# Compose resolves from the .env file automatically.

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_MAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=${ACME_STORAGE_DIR}/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /run/user/1001/docker.sock:/var/run/docker.sock:ro
      - ${ACME_STORAGE_DIR}:${ACME_STORAGE_DIR}
    labels:
      traefik.enable: "true"
      # Dashboard at traefik.APP_DOMAIN with basic auth
      traefik.http.routers.dashboard.rule: Host(`traefik.${APP_DOMAIN}`)
      traefik.http.routers.dashboard.entrypoints: websecure
      traefik.http.routers.dashboard.tls.certresolver: letsencrypt
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.routers.dashboard.middlewares: dashboard-auth
      traefik.http.middlewares.dashboard-auth.basicauth.users: ${TRAEFIK_DASHBOARD_USERS}

  app:
    image: ghcr.io/your-org/your-app:latest
    restart: unless-stopped
    depends_on:
      - traefik
    # Pass only the variables this service needs.
    # These are resolved from the .env file.
    environment:
      - NODE_ENV=${NODE_ENV}
      - APP_SECRET=${APP_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
    labels:
      traefik.enable: "true"
      traefik.http.routers.app.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.app.entrypoints: websecure
      traefik.http.routers.app.tls.certresolver: letsencrypt
      traefik.http.services.app.loadbalancer.server.port: "3000"
