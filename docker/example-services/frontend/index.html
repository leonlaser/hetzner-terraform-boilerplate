<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Example Frontend</title>
</head>
<body>
    <pre><code id="api-output">Loading...</code></pre>
    <script>
        const output = document.getElementById('api-output');
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/api');
        xhr.onload = function() {
            try {
                const data = JSON.parse(xhr.responseText);
                const responseString = JSON.stringify(data, null, 2);

                if (xhr.status === 200) {
                    output.textContent = 'API Response:\n';
                } else {
                    output.textContent = 'Error fetching API: ' + xhr.status + ' ' + xhr.statusText + '\n';
                }

                output.textContent += '\n' + responseString;

            } catch (e) {
                output.textContent = 'Error parsing JSON: ' + e.message;
            }
        };
        xhr.onerror = function() {
            output.textContent = 'Network error occurred.';
        };
        xhr.send();
    </script>
</body>
</html>
