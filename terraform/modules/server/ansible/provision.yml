---
- name: Base server provisioning
  hosts: all
  become: false
  gather_facts: false

  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 10

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      register: cloud_init_result
      failed_when: cloud_init_result.rc not in [0, 2]

    - name: Write SMTP password
      ansible.builtin.copy:
        content: "{{ smtp_password }}"
        dest: /home/ops/.msmtp-password
        mode: "0600"
      no_log: true

    - name: Write ops internal SSH key
      ansible.builtin.copy:
        content: "{{ ops_internal_key }}"
        dest: /home/ops/.ssh/internal_key
        mode: "0600"
      no_log: true

    - name: Copy check-reboot-required script
      ansible.builtin.copy:
        src: check-reboot-required.sh
        dest: /home/ops/scripts/check-reboot-required.sh
        mode: "0755"

    - name: Configure check-reboot-required crontab
      ansible.builtin.cron:
        name: "check reboot required"
        minute: "0"
        job: "/home/ops/scripts/check-reboot-required.sh"

    - name: Copy check-disk-space script
      ansible.builtin.copy:
        src: check-disk-space.sh
        dest: /home/ops/scripts/check-disk-space.sh
        mode: "0755"

    - name: Configure check-disk-space crontab
      ansible.builtin.cron:
        name: "check disk space"
        minute: "*/15"
        job: "/home/ops/scripts/check-disk-space.sh"

    - name: Copy docker-cleanup script
      ansible.builtin.copy:
        src: docker-cleanup.sh
        dest: /home/ops/scripts/docker-cleanup.sh
        mode: "0755"

    - name: Configure docker-cleanup crontab
      ansible.builtin.cron:
        name: "docker cleanup"
        minute: "0"
        hour: "3"
        job: "/home/ops/scripts/docker-cleanup.sh"
